<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LiteHub — 登录</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(180deg, #050508 0%, #09090b 100%);
    color: #e2e8f0;
    line-height: 1.7;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-container { max-width: 400px; width: 100%; padding: 2rem; }
  .login-card {
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    border-radius: 16px;
    padding: 2.5rem;
    border: 1px solid #334155;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .login-header { text-align: center; margin-bottom: 2rem; }
  .login-header h1 { color: #4ade80; font-size: 2rem; margin-bottom: 0.5rem; }
  .login-header p { color: #94a3b8; font-size: 0.9rem; }
  .form-group { margin-bottom: 1.5rem; }
  .form-group label {
    display: block;
    color: #94a3b8;
    font-size: 0.85rem;
    margin-bottom: 0.5rem;
  }
  .form-group input {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 1px solid #334155;
    border-radius: 8px;
    background: #0f172a;
    color: #e2e8f0;
    font-size: 1rem;
    transition: border-color 0.2s;
  }
  .form-group input:focus { outline: none; border-color: #4ade80; }
  .btn-login {
    width: 100%;
    background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
    color: #fff;
    border: none;
    padding: 0.875rem 1.5rem;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 12px rgba(34,197,94,0.3);
  }
  .btn-login:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(34,197,94,0.4); }
  .btn-login:active { transform: translateY(0); }
  .error-message {
    background: #2d1515;
    border: 1px solid #ef4444;
    color: #fca5a5;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    margin-bottom: 1rem;
    font-size: 0.85rem;
    display: none;
  }
  .back-link { text-align: center; margin-top: 1.5rem; }
  .back-link a { color: #60a5fa; text-decoration: none; font-size: 0.9rem; }
  .back-link a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>🔐 LiteHub</h1>
      <p>输入你的 Bearer Token 来访问 Dashboard</p>
    </div>
    <div id="error" class="error-message"></div>
    <form id="loginForm">
      <div class="form-group">
        <label for="token">Bearer Token</label>
        <input type="password" id="token" placeholder="输入你的 token" required>
      </div>
      <button type="submit" class="btn-login">登录</button>
    </form>
    <div class="back-link">
      <a href="/">← 返回首页</a>
    </div>
  </div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const token = document.getElementById('token').value.trim();
  if (!token) {
    showError('请输入 token');
    return;
  }
  localStorage.setItem('litehub_token', token);
  window.location.href = '/dashboard';
});

function showError(msg) {
  const err = document.getElementById('error');
  err.textContent = msg;
  err.style.display = 'block';
  setTimeout(() => { err.style.display = 'none'; }, 3000);
}
</script>
</body>
</html>

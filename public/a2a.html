<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LiteHub — A2A 任务</title>
<link rel="stylesheet" href="/common.css">
<style>
.task-item{padding:.8rem 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;transition:all .3s}
.task-item:last-child{border-bottom:none}
.task-info{flex:1}
.task-name{color:var(--blue);font-weight:600;font-size:.95rem}
.task-desc{color:var(--muted);font-size:.8rem;margin-top:.2rem}
.task-meta{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.3rem}
.tag{font-size:.7rem;padding:.15rem .5rem;border-radius:4px;background:rgba(96,165,250,.1);color:var(--blue);border:1px solid rgba(96,165,250,.2)}
.tag.running{background:rgba(74,222,128,.1);color:var(--green);border-color:rgba(74,222,128,.2)}
.tag.completed{background:rgba(148,163,184,.1);color:var(--muted);border-color:rgba(148,163,184,.2)}
.tag.failed{background:rgba(239,68,68,.1);color:var(--red);border-color:rgba(239,68,68,.2)}
.task-actions{display:flex;gap:.3rem;flex-shrink:0}
.task-actions button{padding:.3rem .6rem;font-size:.75rem}
</style>
</head>
<body>
<div class="container">
  <div id="header"></div>
  <div id="task-list"><div class="empty">加载中...</div></div>
</div>
<div id="dialog-container"></div>
<script src="/common.js"></script>
<script>
checkAuth();
document.getElementById('header').innerHTML=headerHtml('📋 A2A 任务','a2a');

async function loadData(){
  try{
    const tasks=await fetch('/api/a2a/tasks',{headers:headers()}).then(r=>r.ok?r.json():{tasks:[]}).catch(()=>({tasks:[]}));
    const list=tasks.tasks||[];
    if(list.length===0){document.getElementById('task-list').innerHTML='<div class="empty">暂无 A2A Task</div>';return}
    let html='';
    list.forEach(t=>{
      const status=t.status||'pending';
      html+=`<div class="task-item" data-task-id="${escapeHtml(t.taskId||t.id||'')}">
        <div class="task-info">
          <div class="task-name">${escapeHtml(t.name||t.taskId||'Task')}</div>
          ${t.description?`<div class="task-desc">${escapeHtml(t.description)}</div>`:''}
          <div class="task-meta">
            <span class="tag ${status}">${escapeHtml(status)}</span>
            ${t.targetAgentId?`<span class="tag">→ ${escapeHtml(t.targetAgentId)}</span>`:''}
            ${t.agentId?`<span class="tag">from ${escapeHtml(t.agentId)}</span>`:''}
          </div>
        </div>
        <div class="task-actions">
          ${status==='running'?'<button onclick="cancelTask(this)">取消</button>':''}
          <button class="btn-danger" onclick="deleteTask(this)">删除</button>
        </div>
      </div>`;
    });
    document.getElementById('task-list').innerHTML=html;
  }catch(e){console.error('加载失败',e)}
}

async function cancelTask(el){
  const item=el.closest('.task-item');
  const taskId=item?.dataset.taskId;
  if(!taskId)return;
  await fetch('/api/a2a/task/cancel',{method:'POST',headers:headers(),body:JSON.stringify({taskId})});
  loadData();
}

async function deleteTask(el){
  const item=el.closest('.task-item');
  const taskId=item?.dataset.taskId;
  if(!taskId)return;
  showDeleteDialog('删除 Task','确定要删除此 Task 吗？',async()=>{
    item.style.opacity='0';item.style.transform='translateX(-20px)';setTimeout(()=>item.remove(),300);
  });
}

loadData();
initAutoRefresh(loadData);
</script>
</body>
</html>
